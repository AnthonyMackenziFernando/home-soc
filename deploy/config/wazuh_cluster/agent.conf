<!--
  Home SOC — centralised agent configuration
  Author: Anthony Mackenzi

  This file is pushed by the manager to every agent in the 'default' group
  (deployed to /var/ossec/etc/shared/default/agent.conf by scripts/deploy-rules.sh).
  Managing agents centrally like this — instead of hand-editing each endpoint —
  is how detection engineering scales past one machine.

  It intentionally does NOT re-declare the Suricata / auditd / auth.log
  localfiles that scripts/install-agent-linux.sh already adds per-endpoint,
  to avoid ingesting the same log twice.
-->
<agent_config>

  <!-- Real-time File Integrity Monitoring on frequently-abused locations:
       web roots (web shells), tmp (dropped payloads), and cron (persistence). -->
  <syscheck>
    <directories check_all="yes" realtime="yes">/home, /tmp, /var/www</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.d, /etc/cron.daily, /etc/cron.hourly</directories>
    <directories check_all="yes" realtime="yes">/var/spool/cron</directories>
    <frequency>3600</frequency>
    <alert_new_files>yes</alert_new_files>
  </syscheck>

</agent_config>
